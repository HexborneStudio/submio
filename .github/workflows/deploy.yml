name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Deploy Worker
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
        run: |
          echo "=== Deploying Worker ==="
          cd apps/worker
          tar --exclude='.git' --exclude='node_modules' -czf /tmp/worker.tar.gz .
          curl -s -X POST \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/gzip" \
            --data-binary "@/tmp/worker.tar.gz" \
            "https://backboard.railway.app/v2/upload?projectId=$RAILWAY_PROJECT_ID&environmentId=production&serviceName=worker"
          echo "Worker deployed"

      - name: Deploy Web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
        run: |
          echo "=== Deploying Web ==="
          cd apps/web
          tar --exclude='.git' --exclude='node_modules' -czf /tmp/web.tar.gz .
          curl -s -X POST \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/gzip" \
            --data-binary "@/tmp/web.tar.gz" \
            "https://backboard.railway.app/v2/upload?projectId=$RAILWAY_PROJECT_ID&environmentId=production&serviceName=web"
          echo "Web deployed"

      - name: Done
        run: |
          echo "=== Deploy Complete ==="
          echo "Check: https://dashboard.railway.app/project/${{ vars.RAILWAY_PROJECT_ID }}"
