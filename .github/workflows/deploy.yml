name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        env:
          DATABASE_URL: postgresql://localhost/dummy
        run: |
          cd packages/config && npm run build
          cd ../db && npx prisma generate
          cd ../analysis && npm run build
          cd ../shared && npm run build

      - name: Build worker
        env:
          DATABASE_URL: postgresql://localhost/dummy
        run: |
          cd apps/worker && npm run build

      - name: Build web
        env:
          DATABASE_URL: postgresql://localhost/dummy
        run: |
          cd apps/web && npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: HexborneStudio
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ghcr.io/hexbornestudio/submio-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/worker/Dockerfile
          push: true
          tags: ghcr.io/hexbornestudio/submio-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Railway services from images
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_ENV_ID: 46c52c45-0a60-4ea5-9ce4-0eec4d852ffc
        run: |
          echo "Creating Railway services..."
          
          WEB_RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation serviceCreate($input: ServiceCreateInput!) { serviceCreate(input: $input) { id name } }",
              "variables": {
                "input": {
                  "projectId": "'$RAILWAY_PROJECT_ID'",
                  "environmentId": "'$RAILWAY_ENV_ID'",
                  "name": "web",
                  "source": {
                    "image": "ghcr.io/hexbornestudio/submio-web:latest"
                  }
                }
              }
            }' \
            "https://backboard.railway.app/graphql/v2")
          echo "Web service: $WEB_RESP"

          WORKER_RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation serviceCreate($input: ServiceCreateInput!) { serviceCreate(input: $input) { id name } }",
              "variables": {
                "input": {
                  "projectId": "'$RAILWAY_PROJECT_ID'",
                  "environmentId": "'$RAILWAY_ENV_ID'",
                  "name": "worker",
                  "source": {
                    "image": "ghcr.io/hexbornestudio/submio-worker:latest"
                  }
                }
              }
            }' \
            "https://backboard.railway.app/graphql/v2")
          echo "Worker service: $WORKER_RESP"

      - name: Deploy Railway services
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
        run: |
          DEPLOY_RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { deploymentRestart(projectId: \"'$RAILWAY_PROJECT_ID'\") { id } }"
            }' \
            "https://backboard.railway.app/graphql/v2")
          echo "Deploy: $DEPLOY_RESP"
          
          echo ""
          echo "=== Done ==="
          echo "Check: https://dashboard.railway.app/project/$RAILWAY_PROJECT_ID"
