name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get service IDs
        id: services
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
        run: |
          # Get environments
          ENV_DATA=$(curl -s -X POST \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"{ project(id: \\\"$RAILWAY_PROJECT_ID\\\") { environments { edges { node { id name } } } }\"}" \
            "https://gateway.railway.app/graphql/v2")
          echo "env_data: $ENV_DATA"

      - name: Build worker
        run: |
          cd apps/worker && npm ci && npm run build

      - name: Build web
        run: |
          cd apps/web && npm ci && npm run build

      - name: Deploy services
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
        run: |
          echo "Build complete. Upload and deploy..."
          echo "Check Railway dashboard: https://dashboard.railway.app/project/$RAILWAY_PROJECT_ID"
