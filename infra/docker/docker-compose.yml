version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: authorship_receipt
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://dev:devpassword@postgres:5432/authorship_receipt
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ADMIN_SECRET: ${ADMIN_SECRET:-change-me}
      STORAGE_LOCAL_DIR: /app/storage
      WORKER_URL: http://worker:3001
    depends_on:
      - postgres
      - redis
    volumes:
      - storage:/app/storage

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      DATABASE_URL: postgresql://dev:devpassword@postgres:5432/authorship_receipt
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ADMIN_SECRET: ${ADMIN_SECRET:-change-me}
      STORAGE_LOCAL_DIR: /app/storage
      WORKER_URL: http://worker:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      - postgres
      - redis
      - worker
    volumes:
      - storage:/app/storage
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  storage:
